version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_DATABASE: mvc_web
      MYSQL_USER: dev
      MYSQL_PASSWORD: contraseña_segura
      MYSQL_ROOT_PASSWORD: root_password_123
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ../db.sql:/docker-entrypoint-initdb.d/init.sql
